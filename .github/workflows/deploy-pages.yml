name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    # Pinned (not ubuntu-latest): @playwright/test is pinned to 1.44.1 for
    # local Node 20.5.1 compatibility (see package.json), and that Playwright
    # version predates official Ubuntu 24.04 support, which is what
    # ubuntu-latest now resolves to -- `playwright install --with-deps` fails
    # outright on it. ubuntu-22.04 is a version this Playwright release fully
    # supports.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npx playwright install --with-deps chromium
      # Chromium only: Firefox is a documented, reproduced-in-this-cycle
      # flake (fails in beforeAll boot on every spec, not just intermittently
      # -- see tests/e2e/README.md) that isn't safe to gate deploys on yet.
      # Available locally via `npx playwright test --project=firefox`.
      - run: npx playwright test --project=chromium
      - run: npm run build
        env:
          GITHUB_PAGES: "true"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
